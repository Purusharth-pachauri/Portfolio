<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Student Portal Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-layout">
        <!-- Mobile Overlay -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <img src="https://upload.wikimedia.org/wikipedia/en/9/98/Dr._A.P.J._Abdul_Kalam_Technical_University_logo.png" alt="Logo" width="40" height="40">
                EDU
            </div>
            
            <nav>
                <ul class="nav-links">
                    <li><a href="details.html" target="mainFrame" class="active">🏠 Dashboard Home</a></li>
                    <li><a href="sem1.html" target="mainFrame">📘 1st Semester</a></li>
                    <li><a href="sem2.html" target="mainFrame">📗 2nd Semester</a></li>
                    <li><a href="sem3.html" target="mainFrame">📙 3rd Semester</a></li>
                    <li><a href="webpractice/index.html" target="mainFrame">💡 Web Practice</a></li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <a href="login.html" target="mainFrame" class="btn btn-outline">Student Login</a>
                <a href="login.html" target="mainFrame" class="btn btn-outline">Staff Login</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="content-area">
            <header class="top-header">
                <button id="menu-toggle" class="menu-btn" aria-label="Toggle Navigation">
                    <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <span class="header-title">Department of Computer Science and Engineering</span>
            </header>
            
            <div class="iframe-container">
                <iframe src="details.html" name="mainFrame" title="Main Content Area"></iframe>
            </div>
        </main>
    </div>

    <!-- Active Link Script & Mobile Menu -->
    <script>
        const links = document.querySelectorAll('.nav-links a');
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');

        links.forEach(link => {
            link.addEventListener('click', function() {
                links.forEach(l => l.classList.remove('active'));
                this.classList.add('active');
                
                // Close sidebar on mobile after clicking link
                if (window.innerWidth <= 768) {
                    sidebar.classList.remove('active');
                    overlay.classList.remove('active');
                }
            });
        });

        // Mobile Menu Toggle
        const menuToggle = document.getElementById('menu-toggle');
        if (menuToggle && sidebar && overlay) {
            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            });
            overlay.addEventListener('click', () => {
                sidebar.classList.remove('active');
                overlay.classList.remove('active');
            });
        }
    </script>
</body>
</html>
