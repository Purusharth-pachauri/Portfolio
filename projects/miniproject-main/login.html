<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background: transparent;">
    <div class="page-container" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
        <div class="card" style="width: 100%; max-width: 400px; text-align: center;">
            <h1 class="page-title" style="font-size: 1.8rem; text-align: center;">Welcome Back,</h1>
            <p class="page-subtitle" style="text-align: center; margin-bottom: 2rem;">Please sign in to your RBSETC account</p>
            
            <form action="details.html" target="_self" method="get">
                <div class="form-group">
                    <input type="text" placeholder="Username" class="form-input" required>
                </div>
                <div class="form-group">
                    <input type="password" placeholder="Password" class="form-input" required name="password">
                </div>
                
                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">LOGIN</button>
                
                <div style="margin-top: 1.5rem;">
                    <a href="#" style="color: var(--primary); text-decoration: none; font-size: 0.9rem;">Forgot Password?</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
