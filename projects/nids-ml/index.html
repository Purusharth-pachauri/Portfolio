<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NIDS-ML Intrustion Detection</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-layer"></div>
    <div class="container">
        <header>
            <div class="logo">NIDS<span>-ML</span></div>
            <p>Real-time Network Intrusion Detection</p>
        </header>
        
        <main>
            <div class="card input-card">
                <h2>Flow Features Input</h2>
                <p class="subtitle">Enter the 41 network flow features from your PCAP or sensor.</p>
                <form id="predict-form">
                    <div class="textarea-container">
                        <textarea id="feature-input" placeholder='{"duration": 0, "protocol_type": "tcp", "service": "http", ...}'></textarea>
                    </div>
                    <div class="actions">
                        <button type="button" id="load-sample-btn" class="btn btn-outline">Load Sample Attack</button>
                        <button type="submit" class="btn btn-primary">Run Detection</button>
                    </div>
                </form>
            </div>

            <div class="card result-card" id="result-card">
                <h2>Analysis Result</h2>
                <div class="result-display" id="result-display">
                    <span class="status-icon" id="status-icon">⏳</span>
                    <h3 id="result-label">Awaiting Input...</h3>
                    <p id="result-confidence"></p>
                </div>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
